<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <p class="footer-copy">
        &copy; {{ 'now' | date: "%Y" }} <a href="{{ '/' | relative_url }}">{{ site.title }}</a>.
        Được xây dựng với <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
        và lưu trú trên <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>.
      </p>
      <nav class="footer-nav">
        <a href="{{ '/feed.xml' | relative_url }}" class="footer-link" target="_blank" rel="noopener">RSS</a>
        <a href="{{ '/about/' | relative_url }}" class="footer-link">Về tôi</a>
        <a href="{{ '/archive/' | relative_url }}" class="footer-link">Lưu trữ</a>
      </nav>
    </div>
  </div>
</footer>

<script>
  document.getElementById('themeToggle').addEventListener('click', function() {
    const root = document.documentElement;
    const isDark = root.getAttribute('data-theme') === 'dark';
    if (isDark) {
      root.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      root.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
  });
</script>
